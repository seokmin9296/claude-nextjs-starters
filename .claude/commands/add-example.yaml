name: add-example
description: 새로운 Example 컴포넌트를 생성합니다
argument-hint: "[Example 이름]"
shell: powershell
command: |
  if ($args.Count -eq 0) {
    Write-Host "❌ Example 이름을 입력해주세요" -ForegroundColor Red
    Write-Host "사용법: /add-example YourComponentName" -ForegroundColor Yellow
    exit 1
  }

  $exampleName = $args[0]
  $componentName = $exampleName.Substring(0,1).ToUpper() + $exampleName.Substring(1)
  $exampleDir = "src/example"
  $fileName = "$exampleDir/$componentName.tsx"

  # src/example 디렉토리 생성
  if (-not (Test-Path $exampleDir)) {
    New-Item -ItemType Directory -Path $exampleDir -Force | Out-Null
    Write-Host "📁 $exampleDir 디렉토리 생성" -ForegroundColor Green
  }

  # 파일이 이미 존재하는지 확인
  if (Test-Path $fileName) {
    Write-Host "⚠️ $fileName 파일이 이미 존재합니다" -ForegroundColor Yellow
    exit 1
  }

  # React 컴포넌트 템플릿 생성
  $template = @"
'use client'

interface ${componentName}Props {
  // Props를 여기에 정의하세요
}

export default function ${componentName}({ }: ${componentName}Props) {
  return (
    <div className="min-h-screen bg-gradient-to-b from-slate-50 to-white px-4 py-12">
      <div className="max-w-4xl mx-auto">
        <div className="bg-white rounded-lg shadow-lg p-8 border border-slate-200">
          <h1 className="text-4xl font-bold mb-4 text-slate-900">
            ${componentName}
          </h1>

          <p className="text-lg text-slate-600 mb-8">
            이곳에 컴포넌트 설명을 추가하세요.
          </p>

          {/* 컴포넌트 내용을 여기에 추가하세요 */}
          <div className="p-6 bg-slate-50 rounded-lg border border-slate-300">
            <p className="text-slate-700">
              컴포넌트 구현이 여기에 들어갑니다.
            </p>
          </div>
        </div>
      </div>
    </div>
  )
}
"@

  # 파일 생성
  Set-Content -Path $fileName -Value $template -Encoding UTF8
  Write-Host "✅ $fileName 파일이 생성되었습니다" -ForegroundColor Green
  Write-Host "📝 경로: /$exampleName" -ForegroundColor Cyan
